apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}
rules:
  # Watch and manage PostgresDatabase resources
  - apiGroups: [postgresdbadminoperator.github.io]
    resources: [postgresdatabases, postgresdatabases/status]
    verbs: [get, list, watch, patch, update]
  # Kopf requires CRD discovery and event management
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # Write credentials secrets
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update]
