name: Release Chart

on:
  push:
    branches:
      - main
    paths:
      - charts/**
  pull_request: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get chart version
        id: chart
        run: |
          echo "version=$(grep '^version:' charts/postgres-db-admin-operator/Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Chart | Push
        uses: appany/helm-oci-chart-releaser@v0.5.0
        with:
          name: postgres-db-admin-operator
          repository: nielstenboom
          tag: ${{ steps.chart.outputs.version }}
          path: charts/postgres-db-admin-operator
          registry: ghcr.io
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
