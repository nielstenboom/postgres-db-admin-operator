name: Release

on:
  push:
    branches:
      - main
    paths:
      - charts/**
      - src/**
      - Dockerfile

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get chart version
        id: chart
        run: |
          echo "version=$(grep '^version:' charts/postgres-db-admin-operator/Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/nielstenboom/postgres-db-admin-operator:${{ steps.chart.outputs.version }}

      - name: Push Helm chart
        if: github.event_name != 'pull_request'
        uses: appany/helm-oci-chart-releaser@v0.5.0
        with:
          name: postgres-db-admin-operator
          repository: nielstenboom/charts
          tag: ${{ steps.chart.outputs.version }}
          path: charts/postgres-db-admin-operator
          registry: ghcr.io
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
