name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Chart.yaml version was bumped
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:charts/postgres-db-admin-operator/Chart.yaml | grep '^version:' | awk '{print $2}')
          PR_VERSION=$(grep '^version:' charts/postgres-db-admin-operator/Chart.yaml | awk '{print $2}')
          echo "Base version: $BASE_VERSION"
          echo "PR version:   $PR_VERSION"
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "Error: Chart version was not bumped (still $PR_VERSION)"
            exit 1
          fi

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Run unit tests
        run: uv run pytest -v

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: postgres-operator-dev

      - name: Install Postgres
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          kubectl create namespace postgres
          helm install postgres bitnami/postgresql \
            --namespace postgres \
            --version 18.5.14 \
            -f postgres-dev-values.yaml \
            --wait

      - name: Deploy operator
        run: make deploy

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Port-forward Postgres
        run: kubectl port-forward -n postgres svc/postgres-postgresql 5432:5432 &

      - name: Run integration tests
        run: uv run python scripts/integration_test.py
